<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>CTF Maintenance — Site Spark</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2309090B'/%3E%3Cpath d='M18 3 L8 18 h5.5 L13 29 L24 12 h-6.5 L20 3 z' fill='%232563EB'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --ink: #09090B; --ink-3: #71717A; --line: #E4E4E7; --accent: #2563EB; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', 'Segoe UI', sans-serif; background: #FAFAFA; }
    a:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
    .bar {
      height: 54px;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 0 1.2rem;
      background: rgba(250, 250, 250, .95);
      border-bottom: 1px solid var(--line);
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-weight: 600;
      font-size: .95rem;
      color: var(--ink);
      text-decoration: none;
      padding: .45rem .9rem;
      border: 1px solid var(--ink);
      transition: background .2s, color .2s, border-color .2s;
    }
    .back:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .title { font-weight: 600; font-size: .98rem; color: var(--ink); }
    .tag {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      padding: .25rem .6rem;
      margin-left: .6rem;
      vertical-align: middle;
    }
    .ext { margin-left: auto; font-size: .9rem; font-weight: 500; color: var(--ink-3); text-decoration: none; }
    .ext:hover { color: var(--accent); }
    iframe { display: block; width: 100%; height: calc(100dvh - 54px); border: 0; background: #fff; }
    @media (max-width: 600px) { .title span { display: none; } .ext { display: none; } }
  </style>
</head>
<body>
  <div class="bar">
    <a class="back" href="../index.html#work">← All work</a>
    <span class="title"><span>CTF Maintenance · Gainesville, FL</span><span class="tag">Live client</span></span>
    <a class="ext" href="https://ctfmaintenance.com" target="_blank" rel="noopener">ctfmaintenance.com ↗</a>
  </div>
  <iframe src="sites/ctf-maintenance/index.html" title="CTF Maintenance website"></iframe>
</body>
</html>
